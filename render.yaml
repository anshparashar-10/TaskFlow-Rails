services:
  - type: web
    name: taskflow-api
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow